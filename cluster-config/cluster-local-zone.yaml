apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

# TEMPLATE: replace all placeholder values (vpc-XXX, sg-XXX, subnet-*, AZ name)
# before applying. Requires a pre-existing VPC with Local Zone subnets.

metadata:
  name: eks-demo-local-zone
  region: us-east-1
  version: "1.35"

availabilityZones:
- us-east-1a
- us-east-1b

vpc:
  # BYO-VPC: supply id/securityGroup/subnets; do NOT also set cidr.
  clusterEndpoints:
    privateAccess: true
    publicAccess: true
  manageSharedNodeSecurityGroupRules: true
  nat:
    gateway: HighlyAvailable
  publicAccessCIDRs: # you should configured a proper CIDR list here
  - 0.0.0.0/0
  id: "vpc-XXX" # replace with your VPC id
  securityGroup: "sg-XXX" # replace with your control-plane security group id
  subnets:
    private: # region subnets for control plane
      us-east-1a:
        id: "subnet-REGION-A"
      us-east-1b:
        id: "subnet-REGION-B"
    public: # Local Zone subnets for node group
      localzone-1:
        az: "us-east-1-msp-1a"
        id: "subnet-XXX"
      localzone-2:
        az: "us-east-1-msp-1a"
        id: "subnet-YYY"

accessConfig:
  authenticationMode: API_AND_CONFIG_MAP
  bootstrapClusterCreatorAdminPermissions: true

nodeGroups:
  - name: ng-lz1
    amiFamily: AmazonLinux2023
    minSize: 2
    maxSize: 5
    desiredCapacity: 2
    volumeSize: 30
    volumeType: gp3
    instanceType: t3.medium # Local Zone have no "t3a", https://aws.amazon.com/about-aws/global-infrastructure/localzones/features/
    ssh:
      allow: false # set true and provide `publicKeyName` only if you need SSH
    subnets:
      - localzone-1
      - localzone-2

addonsConfig:
  # - https://docs.aws.amazon.com/eks/latest/eksctl/pod-identity-associations.html
  autoApplyPodIdentityAssociations: false

addons:
  - name: kube-proxy
    version: latest
  - name: vpc-cni
    version: latest
    podIdentityAssociations:
    - namespace: kube-system
      serviceAccountName: aws-node
      permissionPolicyARNs:
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  - name: coredns
    version: latest
  - name: eks-pod-identity-agent
    version: latest

cloudWatch:
  # ref: https://docs.aws.amazon.com/eks/latest/userguide/control-plane-logs.html
  clusterLogging:
    logRetentionInDays: 90
    enableTypes:
    - "api"
    - "audit"
    - "authenticator"
    - "controllerManager"
    - "scheduler"
